<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — To-Do Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .icon { text-align: center; margin-bottom: 8px; }
    .icon img { height: 64px; width: auto; }
    h1 { text-align: center; font-size: 21px; color: #1e3a8a; margin-bottom: 6px; }
    .notice {
      background: #fef3c7; border: 1px solid #f59e0b; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #92400e; margin-bottom: 22px; text-align: center;
    }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 15px; color: #111827; outline: none;
      transition: border-color 0.2s; margin-bottom: 18px;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%; padding: 12px;
      background: #2563eb; color: white; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error   { background: #fee2e2; color: #991b1b; }
    .success { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon"><img src="/susidha-logo.png" alt="Susidha" /></div>
  <h1>Set Your Password</h1>
  <p class="notice">This is your first login. Please set a new password before continuing.</p>
  <div class="msg" id="msg"></div>
  <label for="current">Temporary Password</label>
  <input type="password" id="current" placeholder="Enter your temporary password" />
  <label for="newpw">New Password</label>
  <input type="password" id="newpw" placeholder="At least 6 characters" />
  <label for="confirm">Confirm New Password</label>
  <input type="password" id="confirm" placeholder="Repeat new password" />
  <button onclick="changePassword()">Set Password & Continue</button>
</div>
<script>
  async function changePassword() {
    const currentPassword = document.getElementById('current').value;
    const newPassword     = document.getElementById('newpw').value;
    const confirm         = document.getElementById('confirm').value;
    const msgEl           = document.getElementById('msg');

    msgEl.className = 'msg'; msgEl.style.display = 'none';

    if (newPassword !== confirm) {
      msgEl.className = 'msg error'; msgEl.textContent = 'New passwords do not match.';
      msgEl.style.display = 'block'; return;
    }

    const res = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.className = 'msg error'; msgEl.textContent = data.error;
      msgEl.style.display = 'block'; return;
    }

    msgEl.className = 'msg success'; msgEl.textContent = 'Password updated! Redirecting…';
    msgEl.style.display = 'block';
    setTimeout(() => window.location.href = '/', 1000);
  }
</script>
</body>
</html>
