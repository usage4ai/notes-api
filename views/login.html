<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — To-Do Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 22px; color: #1e3a8a; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 15px; color: #111827; outline: none;
      transition: border-color 0.2s; margin-bottom: 18px;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%; padding: 12px;
      background: #2563eb; color: white; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .error {
      background: #fee2e2; color: #991b1b; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">✅</div>
  <h1>To-Do Tracker</h1>
  <p class="subtitle">Sign in to manage your tasks</p>
  <div class="error" id="err"></div>
  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
  <button onclick="login()">Sign In</button>
</div>
<script>
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('err');
    errEl.style.display = 'none';

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
      return;
    }
    window.location.href = data.mustChangePassword ? '/change-password' : '/';
  }
</script>
</body>
</html>
