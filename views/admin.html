<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — To-Do Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #7c2d12, #dc2626);
      color: white; padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left .icon { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.8; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .btn-nav {
      background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.25); }

    main { max-width: 900px; margin: 32px auto; padding: 0 20px; }

    .card {
      background: white; border-radius: 12px; padding: 28px 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 28px;
    }
    .card h2 { font-size: 16px; font-weight: 600; color: #7c2d12; margin-bottom: 20px; }

    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 160px; }
    .form-row-optional { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .form-row-optional .form-group { flex: 1; min-width: 160px; }
    .optional-label { font-size: 11px; color: #9ca3af; font-weight: 400; margin-left: 4px; text-transform: none; letter-spacing: 0; }
    label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #cbd5e0; border-radius: 8px;
      font-size: 14px; color: #2d3748; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #dc2626; }

    .btn-create {
      background: #dc2626; color: white; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
      white-space: nowrap; height: 40px; transition: background 0.2s;
    }
    .btn-create:hover { background: #b91c1c; }

    .msg { margin-top: 12px; padding: 8px 14px; border-radius: 6px; font-size: 13px; display: none; }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #7c2d12; color: white; }
    thead th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    tbody tr { border-bottom: 1px solid #e2e8f0; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fff5f5; }
    tbody td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }

    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .badge-admin    { background: #fee2e2; color: #991b1b; }
    .badge-user     { background: #dbeafe; color: #1d4ed8; }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-active   { background: #d1fae5; color: #065f46; }

    .btn-delete {
      background: transparent; color: #dc2626; border: 1px solid #dc2626;
      border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: #dc2626; color: white; }
    .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="icon">🛡️</div>
    <div>
      <h1>Admin Panel</h1>
      <p id="adminName">Logged in as admin</p>
    </div>
  </div>
  <div class="header-actions">
    <a href="/" class="btn-nav">← My Tasks</a>
    <button class="btn-nav" onclick="logout()">Sign Out</button>
  </div>
</header>

<main>

  <!-- Create User -->
  <div class="card">
    <h2>Create New User Account</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="newUsername">Username</label>
        <input type="text" id="newUsername" placeholder="e.g. john_doe" />
      </div>
      <div class="form-group">
        <label for="tempPassword">Temporary Password</label>
        <input type="password" id="tempPassword" placeholder="User must change on first login" />
      </div>
    </div>
    <div class="form-row-optional">
      <div class="form-group">
        <label for="newName">Full Name <span class="optional-label">(optional)</span></label>
        <input type="text" id="newName" placeholder="e.g. John Doe" />
      </div>
      <div class="form-group">
        <label for="newEmail">Email <span class="optional-label">(optional)</span></label>
        <input type="text" id="newEmail" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label for="newPhone">Phone <span class="optional-label">(optional)</span></label>
        <input type="text" id="newPhone" placeholder="+1 555 000 0000" />
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn-create" onclick="createUser()">Create User</button>
      </div>
    </div>
    <div class="msg" id="createMsg"></div>
  </div>

  <!-- Users Table -->
  <div class="card">
    <h2>All Users</h2>
    <div id="usersTable"></div>
  </div>

</main>

<script>
  async function init() {
    const me = await fetch('/api/me').then(r => r.json());
    document.getElementById('adminName').textContent = `Logged in as ${me.username}`;
    loadUsers();
  }

  async function loadUsers() {
    const users = await fetch('/admin/api/users').then(r => r.json());
    const me = await fetch('/api/me').then(r => r.json());

    const rows = users.map(u => `
      <tr>
        <td><strong>${u.username}</strong></td>
        <td><span class="badge ${u.isAdmin ? 'badge-admin' : 'badge-user'}">${u.isAdmin ? 'Admin' : 'User'}</span></td>
        <td><span class="badge ${u.mustChangePassword ? 'badge-pending' : 'badge-active'}">${u.mustChangePassword ? 'Pending change' : 'Active'}</span></td>
        <td>${u.taskCount} task${u.taskCount !== 1 ? 's' : ''}</td>
        <td>
          <button class="btn-delete" onclick="deleteUser('${u.username}')"
            ${u.username === me.username ? 'disabled title="Cannot delete your own account"' : ''}>
            Delete
          </button>
        </td>
      </tr>`).join('');

    document.getElementById('usersTable').innerHTML = `
      <table>
        <thead>
          <tr><th>Username</th><th>Role</th><th>Status</th><th>Tasks</th><th>Action</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function createUser() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('tempPassword').value;
    const name     = document.getElementById('newName').value.trim();
    const email    = document.getElementById('newEmail').value.trim();
    const phone    = document.getElementById('newPhone').value.trim();
    const msgEl    = document.getElementById('createMsg');
    msgEl.className = 'msg';

    const res = await fetch('/admin/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, name, email, phone })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.className = 'msg error'; msgEl.textContent = data.error; return;
    }

    msgEl.className = 'msg success';
    msgEl.textContent = `User "${data.username}" created. They must change their password on first login.`;
    document.getElementById('newUsername').value = '';
    document.getElementById('tempPassword').value = '';
    document.getElementById('newName').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPhone').value = '';
    loadUsers();
    setTimeout(() => { msgEl.className = 'msg'; }, 4000);
  }

  async function deleteUser(username) {
    if (!confirm(`Delete user "${username}" and all their tasks? This cannot be undone.`)) return;
    await fetch(`/admin/api/users/${username}`, { method: 'DELETE' });
    loadUsers();
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  init();
</script>
</body>
</html>
